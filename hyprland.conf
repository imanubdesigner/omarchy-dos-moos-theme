# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
# Sourced AFTER the omarchy default looknfeel.conf -> these values override it.
# Palette: Abyss #171F22 · Outer Space #3A4849 · Linen #F8EBE3 · Arylide #F4E276 · Neon Lime #D4FF1F

general {
    border_size = 1
    col.active_border = rgb(A5B5AB)                      # Ash Gray (Palette A-custom)
    col.inactive_border = rgb(35373A)                    # Dark Charcoal (inactive from F)
}

group {
    col.border_active = rgb(A5B5AB)
    col.border_inactive = rgb(35373A)
}

decoration {
    rounding = 4
    rounding_power = 2

    active_opacity = 0.94
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(0A0B06ee)          # near-black, deeper since shadow is now the only depth effect
        color_inactive = rgba(0A0B0688)
    }

    # blur OFF (per request) — shadow provides the depth instead:
    blur {
        enabled = false
    }

    # Global film-grain shader is ready in this folder, but OFF by default.
    # NVIDIA: can stutter + overlays the bar. Uncomment one line to test:
    # screen_shader = ~/.config/omarchy/current/theme/grain.frag
}

# Keep image viewers / video players / media tools fully opaque.
# `override` stops the value from multiplying with active_opacity above
# (omarchy exempts these from its tag-opacity, but our global opacity bled in).
windowrule = opacity 1.0 override 1.0 override, match:class ^(imv|mpv|vlc|org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|zoom|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta)$
